name: tyre_management
description: A Tyre Management App - Tyre Track

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any
  firebase_messaging: any
  firebase_analytics: any
  firebase_crashlytics: any
  cloud_functions: any

  # State & Navigation
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.2.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  lottie: ^3.1.0
  fl_chart: ^0.68.0

  # Forms
  flutter_form_builder: any
  form_builder_validators: any

  # Notifications
  flutter_local_notifications: ^17.1.1

  # Payments
  razorpay_flutter: ^1.3.6

  # Images
  image_picker: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0

  # Utils
  intl: any
  url_launcher: ^6.2.6
  google_sign_in: ^6.2.1
  share_plus: any
  connectivity_plus: ^6.0.0
  add_2_calendar: ^3.0.1
  uuid: any

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/